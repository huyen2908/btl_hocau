{% extends 'base.html' %}
{% block title %}Trang chủ{% endblock %}
{% block content %}
  <h1>Hồ câu nổi bật</h1>
  <div class="row">
    {% for p in ponds %}
    <div class="col-md-4">
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">{{ p.name }}</h5>
          <p class="card-text">{{ p.address }}</p>
          <a href="{{ url_for('main.ho_cau_detail', pond_id=p.id) }}" class="btn btn-primary">Xem chi tiết</a>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
{% endblock %}
